services:
  db:
    image: postgres:16-alpine
    container_name: orchard_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orchard_redis
    restart: always
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    container_name: orchard_chroma
    restart: always
    ports:
      - "8010:8000"
    volumes:
      - chroma_data:/chroma/data

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: orchard_auth_service
    restart: always
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      JWT_SECRET_KEY: your-jwt-secret-key-must-match-auth-service
      JWT_ALGORITHM: HS256
      JWT_TOKEN_EXPIRY: "60"
      AUTH_SERVICE_PORT: "8001"
    depends_on:
      - db

  pdf_api:
    build:
      context: ./pdf_service
      dockerfile: Dockerfile
    container_name: orchard_pdf_api
    restart: always
    ports:
      - "8002:8002"
    command: python run.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      JWT_SECRET_KEY: your-jwt-secret-key-must-match-auth-service
      JWT_ALGORITHM: HS256
      PDF_SERVICE_PORT: "8002"
    depends_on:
      - db
      - redis
      - chroma

  pdf_worker:
    build:
      context: ./pdf_service
      dockerfile: Dockerfile
    container_name: orchard_pdf_worker
    restart: always
    command: python -m celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      JWT_SECRET_KEY: your-jwt-secret-key-must-match-auth-service
      JWT_ALGORITHM: HS256
    depends_on:
      - db
      - redis
      - chroma

  vdb_service:
    build:
      context: ./vdb_service
      dockerfile: Dockerfile
    container_name: orchard_vdb_service
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: your-jwt-secret-key-must-match-auth-service
      JWT_ALGORITHM: HS256
      JWT_TOKEN_EXPIRY: "60"
    depends_on:
      - db
      - chroma

  visualisation_service:
    build:
      context: ./visualisation_service
      dockerfile: Dockerfile
    container_name: orchard_visualisation_service
    restart: always
    ports:
      - "8003:8003"
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      JWT_SECRET_KEY: your-jwt-secret-key-must-match-auth-service
      JWT_ALGORITHM: HS256
      VISUALISATION_SERVICE_PORT: "8003"
    depends_on:
      - chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orchard_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - auth_service
      - vdb_service
      - pdf_api
      - visualisation_service

volumes:
  db_data:
  chroma_data:

